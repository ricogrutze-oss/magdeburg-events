name: Magdeburg Events aktualisieren

on:
  schedule:
    # Jeden 1. des Monats um 07:00 Uhr
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  update-events:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Veranstaltungen abrufen (pro Quelle)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-events.js

      - name: events.json committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "Events aktualisiert: $(date '+%d.%m.%Y %H:%M')"
          git push
