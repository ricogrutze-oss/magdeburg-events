<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auftragsmappe</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#143f3b">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Auftragsmappe">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --bg: #eef1f0;
    --panel: #ffffff;
    --ink: #16221f;
    --ink-soft: #55635f;
    --line: #d7ddda;
    --line-soft: #e6eae8;
    --teal: #1f5c56;
    --teal-deep: #143f3b;
    --amber: #b5790a;
    --amber-bg: #fbeed4;
    --blue: #2b5a8c;
    --blue-bg: #dde7f2;
    --purple: #6a4c8c;
    --purple-bg: #e8e0f2;
    --red: #a3392f;
    --red-bg: #f5e0dd;
    --green: #2c7a4b;
    --green-bg: #dcefe1;
    --gray-bg: #e7e9e8;
    --font-display: 'IBM Plex Sans', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:14px;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--teal); color:#fff; }

  /* Header */
  header.app-head{
    background:var(--teal-deep);
    color:#eef4f2;
    padding:22px 28px 18px;
    border-bottom:4px solid var(--teal);
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#8fbdb2;
    margin-bottom:4px;
  }
  .app-title{
    font-family:var(--font-display);
    font-size:24px;
    font-weight:700;
    letter-spacing:-.01em;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .app-title .stamp{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:500;
    color:#9fcabf;
    border:1px solid #3a6f68;
    border-radius:3px;
    padding:2px 7px;
  }

  /* Toolbar */
  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:14px 28px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    z-index:20;
  }
  .btn{
    font-family:var(--font-body);
    font-size:13px;
    font-weight:600;
    padding:9px 16px;
    border-radius:6px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    transition:.12s ease;
    white-space:nowrap;
  }
  .btn:hover{ border-color:var(--teal); color:var(--teal-deep); }
  .btn.primary{ background:var(--teal); border-color:var(--teal); color:#fff; }
  .btn.primary:hover{ background:var(--teal-deep); }
  .btn.ghost{ background:transparent; border-color:transparent; color:var(--ink-soft); }
  .btn.ghost:hover{ color:var(--teal-deep); }
  .btn.danger{ color:var(--red); border-color:var(--red-bg); }
  .btn.danger:hover{ background:var(--red-bg); border-color:var(--red); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn.small{ padding:5px 10px; font-size:12px; }
  input[type=file]{ display:none; }
  .spacer{ flex:1; }
  .count-pill{
    font-family:var(--font-mono);
    font-size:12px;
    background:var(--gray-bg);
    padding:3px 9px;
    border-radius:20px;
    color:var(--ink-soft);
  }

  /* Tabs */
  .tabs{
    display:flex;
    gap:2px;
    padding:0 28px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .tab{
    padding:12px 18px 11px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:13.5px;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:3px solid transparent;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .tab .n{
    font-family:var(--font-mono);
    font-size:11px;
    background:var(--gray-bg);
    padding:1px 7px;
    border-radius:10px;
  }
  .tab.active{ color:var(--teal-deep); border-bottom-color:var(--teal); }
  .tab.active .n{ background:var(--teal); color:#fff; }
  .tab:hover:not(.active){ color:var(--ink); }

  main{ padding:20px 28px 60px; max-width:1400px; margin:0 auto; }

  .empty-state{
    padding:70px 20px;
    text-align:center;
    color:var(--ink-soft);
  }
  .empty-state .big{
    font-family:var(--font-display);
    font-size:17px;
    color:var(--ink);
    margin-bottom:6px;
    font-weight:600;
  }

  /* Table */
  .grid-wrap{ background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:11px 12px;
    background:#f6f8f7;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:10px 12px;
    border-bottom:1px solid var(--line-soft);
    vertical-align:middle;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:#fafcfb; }
  .code{ font-family:var(--font-mono); font-size:12.5px; color:var(--teal-deep); font-weight:600; }
  .muted{ color:var(--ink-soft); }
  .cell-input{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    font-family:var(--font-body);
    font-size:13px;
    padding:5px 7px;
    border-radius:5px;
    color:var(--ink);
  }
  .cell-input:hover{ border-color:var(--line); }
  .cell-input:focus{ outline:none; border-color:var(--teal); background:#fff; }
  textarea.cell-input{ resize:vertical; min-height:34px; font-family:var(--font-body); }

  select.status-select{
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:600;
    border:none;
    border-radius:20px;
    padding:6px 26px 6px 12px;
    cursor:pointer;
    appearance:none;
    -webkit-appearance:none;
    background-repeat:no-repeat;
    background-position:right 9px center;
    background-size:9px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23555'/></svg>");
  }
  .st-offen{ background:var(--gray-bg); color:#3d4744; }
  .st-in_bearbeitung{ background:var(--amber-bg); color:var(--amber); }
  .st-termin_vereinbart{ background:var(--blue-bg); color:var(--blue); }
  .st-kunde_rueckmeldung{ background:var(--purple-bg); color:var(--purple); }
  .st-anlage_nicht_fertig{ background:var(--red-bg); color:var(--red); }
  .st-erledigt{ background:var(--green-bg); color:var(--green); }

  .termin-chip{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--blue);
    background:var(--blue-bg);
    padding:4px 9px;
    border-radius:5px;
    white-space:nowrap;
  }
  .row-actions{ display:flex; gap:6px; }
  .icon-btn{
    border:1px solid var(--line);
    background:#fff;
    border-radius:6px;
    padding:6px 9px;
    font-size:12px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .icon-btn:hover{ border-color:var(--teal); color:var(--teal-deep); }

  /* Modal */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(15,26,24,.55);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .modal{
    background:#fff; border-radius:12px; width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .modal-head{
    padding:18px 22px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-head h3{ margin:0; font-family:var(--font-display); font-size:16px; }
  .modal-body{ padding:20px 22px; }
  .modal-foot{ padding:14px 22px 20px; display:flex; gap:10px; justify-content:flex-end; border-top:1px solid var(--line-soft); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:6px;
    font-family:var(--font-body); font-size:13.5px; color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--teal); }
  .field-row{ display:flex; gap:12px; }
  .field-row .field{ flex:1; }
  .hint{ font-size:12px; color:var(--ink-soft); margin-top:4px; line-height:1.5; }
  .close-x{ background:none; border:none; font-size:18px; cursor:pointer; color:var(--ink-soft); }

  .mapping-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .mapping-row label{ width:150px; font-size:13px; font-weight:600; flex-shrink:0; }
  .mapping-row select{ flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:13px; }
  .req-star{ color:var(--red); }

  .history-list{ list-style:none; padding:0; margin:0; }
  .history-list li{
    padding:8px 0; border-bottom:1px solid var(--line-soft); font-size:12.5px;
  }
  .history-list li:last-child{ border-bottom:none; }
  .history-list .ts{ font-family:var(--font-mono); color:var(--ink-soft); font-size:11px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--teal-deep); color:#fff; padding:11px 20px; border-radius:8px;
    font-size:13px; font-weight:500; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,.25);
    display:none;
  }

  .view-toggle{ display:flex; gap:6px; margin-bottom:14px; }
  .view-toggle .btn.active{ background:var(--teal); border-color:var(--teal); color:#fff; }
  .settings-section{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:18px 20px; margin-bottom:16px;
  }
  .settings-section h4{
    margin:0 0 12px; font-family:var(--font-display); font-size:14px; color:var(--teal-deep);
  }
  .settings-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .map-empty{ height:200px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  .leaflet-popup-content{ font-family:var(--font-body); font-size:12.5px; min-width:180px; }
  .leaflet-popup-content .pop-code{ font-family:var(--font-mono); font-weight:700; color:var(--teal-deep); }
  .leaflet-popup-content .pop-status{ display:inline-block; margin-top:4px; padding:2px 8px; border-radius:10px; font-weight:600; font-size:11px; }
  .col-picker label{ display:flex; align-items:center; gap:8px; padding:7px 0; font-size:13.5px; font-weight:500; border-bottom:1px solid var(--line-soft); }
  .col-picker label:last-child{ border-bottom:none; }
  .col-picker input{ width:16px; height:16px; }

  @media (max-width:800px){
    header.app-head, .toolbar, .tabs, main{ padding-left:14px; padding-right:14px; }
    .mapping-row{ flex-wrap:wrap; }
    .mapping-row label{ width:100%; }
    table, thead, tbody, th, td, tr{ display:block; }
    thead{ display:none; }
    tbody tr{ border-bottom:6px solid var(--bg); padding:10px 0; }
    tbody td{ border-bottom:none; padding:6px 12px; display:flex; justify-content:space-between; gap:10px; align-items:center; }
    tbody td::before{ content: attr(data-label); font-family:var(--font-mono); font-size:10px; text-transform:uppercase; color:var(--ink-soft); flex-shrink:0; }
  }
</style>
</head>
<body>

<header class="app-head">
  <div class="eyebrow">Kundenvorgänge · Adressbuch · Termine</div>
  <div class="app-title">Auftragsmappe <span class="stamp" id="orgEmailStamp">Absender nicht gesetzt</span></div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="offen" onclick="switchTab('offen')">Offene Aufträge <span class="n" id="tabCountOffen">0</span></div>
  <div class="tab" data-tab="erledigt" onclick="switchTab('erledigt')">Erledigte Aufträge <span class="n" id="tabCountErledigt">0</span></div>
  <div class="tab" data-tab="adressbuch" onclick="switchTab('adressbuch')">Adressbuch <span class="n" id="tabCountAdr">0</span></div>
  <div class="tab" data-tab="einstellungen" onclick="switchTab('einstellungen')">⚙️ Einstellungen</div>
</div>

<main>
  <div id="view-offen"></div>
  <div id="view-erledigt" style="display:none"></div>
  <div id="view-adressbuch" style="display:none"></div>
  <div id="view-einstellungen" style="display:none"></div>
</main>

<input type="file" id="csvInput" accept=".csv,.tsv,.txt,.xlsx,.xls,.ods" style="display:none">
<input type="file" id="backupInput" accept=".json" style="display:none">

<div class="toast" id="toast"></div>

<script>
/* ---------------------------------------------------------------
   State
--------------------------------------------------------------- */
const STATUS = {
  offen:              { label: 'Offen', cls: 'st-offen' },
  in_bearbeitung:     { label: 'In Bearbeitung', cls: 'st-in_bearbeitung' },
  termin_vereinbart:  { label: 'Termin vereinbart', cls: 'st-termin_vereinbart' },
  kunde_rueckmeldung: { label: 'Kunde meldet sich zurück', cls: 'st-kunde_rueckmeldung' },
  anlage_nicht_fertig:{ label: 'Anlage noch nicht fertig', cls: 'st-anlage_nicht_fertig' },
  erledigt:           { label: 'Erledigt', cls: 'st-erledigt' },
};

let auftraege = [];   // array of Auftrag objects
let adressbuch = [];  // array of Adressbuch entries
let settings = { organizerEmail: '', lastImport: null };
let columnMapping = null; // { kundencode, vorgang, telefonnummer, adresse, zaehlerplatzId, koordinaten }
let currentTab = 'offen';
let pendingCsvRows = null; // rows waiting on mapping confirmation
let pendingCsvHeaders = null;
let terminModalAuftragId = null;
let historyModalTarget = null;
let viewMode = { offen: 'liste', erledigt: 'liste' };
let mapInstances = {};
const DEFAULT_VISIBLE_COLUMNS = {
  vorgang: true, status: true, telefonnummer: true, adresse: true,
  kommentar: true, termin: true, koordinaten: true
};
const COLUMN_DEFS = [
  { key:'vorgang', label:'Vorgang' },
  { key:'status', label:'Status' },
  { key:'telefonnummer', label:'Telefon' },
  { key:'adresse', label:'Adresse' },
  { key:'kommentar', label:'Kommentar' },
  { key:'termin', label:'Termin' },
  { key:'koordinaten', label:'Koordinaten' },
];

function uid(){ return 'a_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function nowIso(){ return new Date().toISOString(); }
function fmtTs(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
}
function norm(s){ return (s||'').toString().trim().toLowerCase(); }
function parseCoords(str){
  if(!str) return null;
  const parts = str.toString().split(/[,;\s]+/).map(p=>p.trim()).filter(Boolean);
  if(parts.length < 2) return null;
  const lat = parseFloat(parts[0].replace(',','.'));
  const lon = parseFloat(parts[1].replace(',','.'));
  if(isNaN(lat) || isNaN(lon)) return null;
  if(lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;
  return { lat, lon };
}
function fmtCoords(c){ return c ? `${c.lat.toFixed(5)}, ${c.lon.toFixed(5)}` : ''; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._h);
  t._h = setTimeout(()=>{ t.style.display='none'; }, 3200);
}

/* ---------------------------------------------------------------
   Storage — works both as a Claude artifact (window.storage) and as
   a standalone hosted app (localStorage + optional linked folder)
--------------------------------------------------------------- */
const hasClaudeStorage = (typeof window.storage !== 'undefined');
const FS_SUPPORTED = ('showDirectoryPicker' in window);
let folderHandle = null;
let folderNeedsPermission = false;
let folderSyncTimer = null;

async function kvGet(key){
  if(hasClaudeStorage){
    try{ const r = await window.storage.get(key); return r ? r.value : null; }
    catch(e){ return null; }
  }
  try{ return localStorage.getItem('am_' + key); }catch(e){ return null; }
}
async function kvSet(key, val){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, val); return; }
    catch(e){ showToast('Speichern fehlgeschlagen: ' + key); return; }
  }
  try{ localStorage.setItem('am_' + key, val); }catch(e){ showToast('Speichern fehlgeschlagen: ' + key); }
}

async function loadAll(){
  try{ const v = await kvGet('auftraege'); auftraege = v ? JSON.parse(v) : []; }catch(e){ auftraege = []; }
  try{ const v = await kvGet('adressbuch'); adressbuch = v ? JSON.parse(v) : []; }catch(e){ adressbuch = []; }
  try{ const v = await kvGet('settings'); settings = v ? JSON.parse(v) : { organizerEmail:'', lastImport:null }; }
  catch(e){ settings = { organizerEmail:'', lastImport:null }; }
  if(!settings.visibleColumns){ settings.visibleColumns = Object.assign({}, DEFAULT_VISIBLE_COLUMNS); }
  try{ const v = await kvGet('column-mapping'); columnMapping = v ? JSON.parse(v) : null; }catch(e){ columnMapping = null; }
}
async function persist(key, val){
  await kvSet(key, JSON.stringify(val));
}
const saveAuftraege  = () => { persist('auftraege', auftraege); scheduleFolderSync(); };
const saveAdressbuch = () => { persist('adressbuch', adressbuch); scheduleFolderSync(); };
const saveSettings   = () => { persist('settings', settings); scheduleFolderSync(); };
const saveMapping    = () => { persist('column-mapping', columnMapping); scheduleFolderSync(); };

/* --- Linked folder (Desktop Chrome/Edge only) ---------------------
   Stores a FileSystemDirectoryHandle in IndexedDB so the permission
   can be silently reused across page reloads (where the browser allows). */
function idbHandleDb(){
  return new Promise((resolve,reject) => {
    const req = indexedDB.open('auftragsmappe-fs', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetHandle(){
  try{
    const db = await idbHandleDb();
    return await new Promise((resolve) => {
      const tx = db.transaction('handles','readonly');
      const r = tx.objectStore('handles').get('dir');
      r.onsuccess = () => resolve(r.result || null);
      r.onerror = () => resolve(null);
    });
  }catch(e){ return null; }
}
async function idbSetHandle(handle){
  try{
    const db = await idbHandleDb();
    await new Promise((resolve) => {
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').put(handle, 'dir');
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  }catch(e){}
}

async function chooseFolder(){
  if(!FS_SUPPORTED){
    showToast('Ordner-Verknüpfung wird nur in Chrome/Edge auf dem Desktop unterstützt');
    return;
  }
  try{
    const handle = await window.showDirectoryPicker();
    folderHandle = handle;
    folderNeedsPermission = false;
    await idbSetHandle(handle);
    await loadFromFolder(true);
    await saveToFolder();
    render();
    showToast('Ordner verknüpft — Daten werden ab jetzt automatisch dorthin gespeichert');
  }catch(e){ /* user cancelled the picker */ }
}
async function reconnectFolder(){
  if(!folderHandle) return;
  try{
    const perm = await folderHandle.requestPermission({ mode:'readwrite' });
    if(perm === 'granted'){
      folderNeedsPermission = false;
      await loadFromFolder(true);
      render();
      showToast('Ordner wieder verbunden');
    } else {
      showToast('Zugriff wurde nicht erlaubt');
    }
  }catch(e){ showToast('Verbindung zum Ordner fehlgeschlagen'); }
}
async function tryRestoreFolder(){
  if(!FS_SUPPORTED) return;
  const handle = await idbGetHandle();
  if(!handle) return;
  folderHandle = handle;
  try{
    const perm = await handle.queryPermission({ mode:'readwrite' });
    if(perm === 'granted'){
      folderNeedsPermission = false;
      await loadFromFolder(true);
    } else {
      folderNeedsPermission = true; // needs a click (user gesture) to reconnect
    }
  }catch(e){ folderNeedsPermission = true; }
}
async function loadFromFolder(silent){
  if(!folderHandle) return;
  try{
    const fileHandle = await folderHandle.getFileHandle('auftragsmappe-daten.json', { create:true });
    const file = await fileHandle.getFile();
    const text = await file.text();
    if(!text || !text.trim()) return;
    const data = JSON.parse(text);
    if(data.kind === 'auftragsmappe-sicherung'){
      mergeBackup(data, silent);
    }
  }catch(e){ console.error('loadFromFolder', e); }
}
async function saveToFolder(){
  if(!folderHandle) return;
  try{
    const payload = { kind:'auftragsmappe-sicherung', version:1, exportedAt: nowIso(), auftraege, adressbuch, settings, columnMapping };
    const fileHandle = await folderHandle.getFileHandle('auftragsmappe-daten.json', { create:true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(payload, null, 2));
    await writable.close();
    settings.folderLastSync = nowIso();
  }catch(e){ console.error('saveToFolder', e); }
}
function scheduleFolderSync(){
  if(!folderHandle || folderNeedsPermission) return;
  clearTimeout(folderSyncTimer);
  folderSyncTimer = setTimeout(saveToFolder, 1200);
}

/* ---------------------------------------------------------------
   Address book helpers
--------------------------------------------------------------- */
function findAdrEntry(zaehlerplatzId, kundencode){
  if(zaehlerplatzId){
    const hit = adressbuch.find(a => a.zaehlerplatzId && norm(a.zaehlerplatzId) === norm(zaehlerplatzId));
    if(hit) return hit;
  }
  return adressbuch.find(a => !a.zaehlerplatzId && a.kundencode && norm(a.kundencode) === norm(kundencode));
}
function upsertAdrFromImport(row){
  let entry = findAdrEntry(row.zaehlerplatzId, row.kundencode);
  if(!entry){
    entry = {
      id: uid(),
      kundencode: row.kundencode || '',
      zaehlerplatzId: row.zaehlerplatzId || '',
      adresse: row.adresse || '',
      telefonnummer: row.telefonnummer || '',
      koordinaten: row.koordinaten || null,
      history: [{ ts: nowIso(), field:'angelegt', old:'', new:'aus Datei-Import' }]
    };
    adressbuch.push(entry);
  } else {
    // Fill only empty fields, never overwrite manual edits
    if(!entry.adresse && row.adresse) entry.adresse = row.adresse;
    if(!entry.telefonnummer && row.telefonnummer) entry.telefonnummer = row.telefonnummer;
    if(!entry.koordinaten && row.koordinaten) entry.koordinaten = row.koordinaten;
  }
  return entry;
}
function updateAuftragCoords(id, value){
  const a = auftraege.find(x => x.id === id);
  if(!a) return;
  const oldStr = fmtCoords(a.koordinaten);
  if(!value.trim()){
    if(!a.koordinaten) return;
    a.history.push({ ts: nowIso(), field:'koordinaten', old: oldStr, new: '' });
    a.koordinaten = null;
    saveAuftraege();
    if(a.adrEntryId) updateAdrCoords(a.adrEntryId, null);
    render();
    return;
  }
  const parsed = parseCoords(value);
  if(!parsed){
    showToast('Ungültiges Koordinatenformat, z.B. 52.130, 11.630');
    render();
    return;
  }
  a.history.push({ ts: nowIso(), field:'koordinaten', old: oldStr, new: fmtCoords(parsed) });
  a.koordinaten = parsed;
  saveAuftraege();
  if(a.adrEntryId) updateAdrCoords(a.adrEntryId, parsed);
  showToast('Gespeichert');
}
function updateAdrCoords(entryId, coords){
  const entry = adressbuch.find(a => a.id === entryId);
  if(!entry) return;
  const oldStr = fmtCoords(entry.koordinaten);
  const newStr = fmtCoords(coords);
  if(oldStr === newStr) return;
  entry.history.push({ ts: nowIso(), field:'koordinaten', old: oldStr, new: newStr });
  entry.koordinaten = coords;
  saveAdressbuch();
}
function updateAdrField(entryId, field, newVal){
  const entry = adressbuch.find(a => a.id === entryId);
  if(!entry) return;
  const oldVal = entry[field] || '';
  if(oldVal === newVal) return;
  entry.history.push({ ts: nowIso(), field, old: oldVal, new: newVal });
  entry[field] = newVal;
  saveAdressbuch();
}

/* ---------------------------------------------------------------
   File Import (CSV/TSV via PapaParse, Excel/ODS via SheetJS)
--------------------------------------------------------------- */
document.getElementById('csvInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const ext = (file.name.split('.').pop() || '').toLowerCase();

  function proceed(rows, headers, sheetInfo){
    if(!rows || rows.length === 0){
      showToast('Keine Zeilen in der Datei gefunden');
      return;
    }
    pendingCsvRows = rows;
    pendingCsvHeaders = headers;
    if(sheetInfo) showToast(sheetInfo);
    if(!columnMapping || !mappingMatchesHeaders(pendingCsvHeaders)){
      openMappingModal(false);
    } else {
      runImport();
    }
  }

  if(ext === 'csv' || ext === 'tsv' || ext === 'txt'){
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        proceed(results.data, results.meta.fields || []);
      },
      error: function(err){ showToast('Datei konnte nicht gelesen werden'); }
    });
  } else if(ext === 'xlsx' || ext === 'xls' || ext === 'ods') {
    const reader = new FileReader();
    reader.onload = function(evt){
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheetName = wb.SheetNames[0];
        const sheet = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
        const headers = rows.length ? Object.keys(rows[0]) : (XLSX.utils.sheet_to_json(sheet, { header:1 })[0] || []);
        const info = wb.SheetNames.length > 1
          ? `Tabellenblatt "${sheetName}" verwendet (von ${wb.SheetNames.length} Blättern)`
          : null;
        proceed(rows, headers, info);
      }catch(err){
        showToast('Excel-Datei konnte nicht gelesen werden');
      }
    };
    reader.onerror = function(){ showToast('Datei konnte nicht gelesen werden'); };
    reader.readAsArrayBuffer(file);
  } else {
    showToast('Nicht unterstütztes Dateiformat: .' + ext);
  }
  e.target.value = '';
});

function mappingMatchesHeaders(headers){
  if(!columnMapping) return false;
  const req = ['kundencode','vorgang'];
  return req.every(k => headers.includes(columnMapping[k]));
}

function openMappingModal(manual){
  const headers = pendingCsvHeaders || (columnMapping ? Object.values(columnMapping).filter(Boolean) : []);
  const fields = [
    { key:'kundencode', label:'Kundencode', required:true },
    { key:'vorgang', label:'Vorgang', required:true },
    { key:'telefonnummer', label:'Telefonnummer', required:false },
    { key:'adresse', label:'Adresse', required:false },
    { key:'zaehlerplatzId', label:'Zählerplatz-ID', required:false },
    { key:'koordinaten', label:'Koordinaten (Breite, Länge)', required:false },
  ];
  const opts = (['']).concat(headers).map(h => h).filter((v,i,a)=>a.indexOf(v)===i);
  let rowsHtml = fields.map(f => {
    const current = columnMapping ? columnMapping[f.key] : '';
    const optionsHtml = opts.map(o => `<option value="${escapeHtml(o)}" ${o===current?'selected':''}>${o===''?'– nicht vorhanden –':escapeHtml(o)}</option>`).join('');
    return `<div class="mapping-row">
      <label>${f.label}${f.required?' <span class="req-star">*</span>':''}</label>
      <select id="map_${f.key}">${optionsHtml}</select>
    </div>`;
  }).join('');

  if(headers.length === 0){
    rowsHtml = `<p class="hint">Noch keine Spalten bekannt. Bitte zuerst eine Datei importieren.</p>`;
  }

  showModal(`
    <div class="modal-head"><h3>Spaltenzuordnung${manual?' bearbeiten':''}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p class="hint" style="margin-top:0">Ordne die Spalten deiner Datei den benötigten Feldern zu. Diese Zuordnung wird gespeichert und beim nächsten Import automatisch wiederverwendet.</p>
      ${rowsHtml}
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" ${headers.length===0?'disabled':''} onclick="confirmMapping(${manual})">Übernehmen${pendingCsvRows && !manual ? ' & importieren' : ''}</button>
    </div>
  `);
}

function confirmMapping(manual){
  const fields = ['kundencode','vorgang','telefonnummer','adresse','zaehlerplatzId','koordinaten'];
  const mapping = {};
  for(const f of fields){
    const el = document.getElementById('map_'+f);
    mapping[f] = el ? el.value : '';
  }
  if(!mapping.kundencode || !mapping.vorgang){
    showToast('Kundencode und Vorgang müssen zugeordnet werden');
    return;
  }
  columnMapping = mapping;
  saveMapping();
  closeModal();
  if(!manual && pendingCsvRows){
    runImport();
  } else {
    showToast('Spaltenzuordnung gespeichert');
  }
}

function runImport(){
  if(!pendingCsvRows || !columnMapping){ return; }
  const m = columnMapping;
  let added = 0, skippedDup = 0, skippedEmpty = 0;

  // build lookup of existing OPEN (not erledigt) auftraege keys
  const existingKeys = new Set(
    auftraege.filter(a => a.status !== 'erledigt')
             .map(a => norm(a.kundencode) + '|' + norm(a.vorgang))
  );

  for(const raw of pendingCsvRows){
    const kundencode = (m.kundencode ? raw[m.kundencode] : '') || '';
    const vorgang = (m.vorgang ? raw[m.vorgang] : '') || '';
    if(!kundencode.trim() || !vorgang.trim()){ skippedEmpty++; continue; }
    const key = norm(kundencode) + '|' + norm(vorgang);
    if(existingKeys.has(key)){ skippedDup++; continue; }

    const telefonnummer = (m.telefonnummer ? raw[m.telefonnummer] : '') || '';
    const adresse = (m.adresse ? raw[m.adresse] : '') || '';
    const zaehlerplatzId = (m.zaehlerplatzId ? raw[m.zaehlerplatzId] : '') || '';
    const koordinaten = m.koordinaten ? parseCoords(raw[m.koordinaten]) : null;

    const adrEntry = upsertAdrFromImport({ kundencode, vorgang, telefonnummer, adresse, zaehlerplatzId, koordinaten });

    auftraege.push({
      id: uid(),
      kundencode: kundencode.trim(),
      vorgang: vorgang.trim(),
      telefonnummer: telefonnummer || adrEntry.telefonnummer || '',
      adresse: adresse || adrEntry.adresse || '',
      zaehlerplatzId: zaehlerplatzId || adrEntry.zaehlerplatzId || '',
      koordinaten: koordinaten || adrEntry.koordinaten || null,
      adrEntryId: adrEntry.id,
      status: 'offen',
      kommentar: '',
      termin: null,
      importedAt: nowIso(),
      history: [{ ts: nowIso(), field:'angelegt', old:'', new:'aus Datei-Import' }]
    });
    existingKeys.add(key);
    added++;
  }

  saveAuftraege();
  saveAdressbuch();
  settings.lastImport = { ts: nowIso(), added, skippedDup, skippedEmpty };
  saveSettings();
  pendingCsvRows = null;
  render();
  showToast(`Import fertig: ${added} neu, ${skippedDup} Duplikate übersprungen`);
}

document.getElementById('backupInput').addEventListener('change', function(e){

// Returns a dedupe+sorted union of two history arrays
function mergeHistories(h1, h2){
  const all = (h1||[]).concat(h2||[]);
  const seen = new Set();
  const out = [];
  for(const h of all){
    const key = h.ts + '|' + h.field + '|' + h.new;
    if(seen.has(key)) continue;
    seen.add(key);
    out.push(h);
  }
  out.sort((a,b) => new Date(a.ts) - new Date(b.ts));
  return out;
}
function lastTs(history){
  if(!history || history.length === 0) return 0;
  return Math.max(...history.map(h => new Date(h.ts).getTime()));
}
// Merge two records of the same entity: field values come from whichever
// side was edited more recently, history is the union of both, nothing lost.
function mergeRecord(local, incoming, fieldKeys){
  const mergedHistory = mergeHistories(local.history, incoming.history);
  const localNewer = lastTs(local.history) >= lastTs(incoming.history);
  const base = localNewer ? local : incoming;
  const merged = Object.assign({}, base);
  merged.history = mergedHistory;
  return merged;
}
function mergeCollection(localArr, incomingArr){
  const map = new Map();
  for(const item of localArr) map.set(item.id, item);
  for(const item of incomingArr){
    if(!map.has(item.id)){
      map.set(item.id, item);
    } else {
      map.set(item.id, mergeRecord(map.get(item.id), item));
    }
  }
  return Array.from(map.values());
}

function mergeBackup(data, silent){
  const beforeA = auftraege.length, beforeB = adressbuch.length;
  auftraege = mergeCollection(auftraege, data.auftraege || []);
  adressbuch = mergeCollection(adressbuch, data.adressbuch || []);

  // keep local settings unless locally unset
  if(!settings.organizerEmail && data.settings && data.settings.organizerEmail){
    settings.organizerEmail = data.settings.organizerEmail;
  }
  if(!columnMapping && data.columnMapping){
    columnMapping = data.columnMapping;
  }
  settings.lastMergeImport = { ts: nowIso(), sourceExportedAt: data.exportedAt };

  saveAuftraege();
  saveAdressbuch();
  saveSettings();
  if(columnMapping) saveMapping();
  if(!silent){
    render();
    showToast(`Sicherung zusammengeführt (${auftraege.length - beforeA >= 0 ? '+'+(auftraege.length-beforeA) : (auftraege.length-beforeA)} Aufträge, ${adressbuch.length - beforeB >= 0 ? '+'+(adressbuch.length-beforeB) : (adressbuch.length-beforeB)} Adressen neu)`);
  }
}

}

function initMapForTab(tabKey, list){
  const withCoords = list.filter(a => a.koordinaten);
  const el = document.getElementById('map-' + tabKey);
  if(!el) return;
  if(mapInstances[tabKey]){ mapInstances[tabKey].remove(); delete mapInstances[tabKey]; }

  if(withCoords.length === 0){
    el.outerHTML = `<div class="map-empty">Keine Koordinaten in ${tabKey === 'erledigt' ? 'den erledigten' : 'den offenen'} Aufträgen vorhanden.</div>`;
    return;
  }

  const map = L.map('map-' + tabKey);
  mapInstances[tabKey] = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  const statusColor = {
    offen:'#55635f', in_bearbeitung:'#b5790a', termin_vereinbart:'#2b5a8c',
    kunde_rueckmeldung:'#6a4c8c', anlage_nicht_fertig:'#a3392f', erledigt:'#2c7a4b'
  };

  const bounds = [];
  withCoords.forEach(a => {
    const color = statusColor[a.status] || '#55635f';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 0 1px ${color}"></div>`,
      iconSize: [16,16], iconAnchor: [8,8]
    });
    const marker = L.marker([a.koordinaten.lat, a.koordinaten.lon], { icon }).addTo(map);
    marker.bindPopup(`
      <div class="pop-code">${escapeHtml(a.kundencode)}</div>
      <div>${escapeHtml(a.vorgang)}</div>
      <div class="pop-status" style="background:${color}22;color:${color}">${STATUS[a.status].label}</div>
      ${a.adresse ? `<div style="margin-top:6px">${escapeHtml(a.adresse)}</div>` : ''}
      ${a.telefonnummer ? `<div class="muted">${escapeHtml(a.telefonnummer)}</div>` : ''}
    `);
    bounds.push([a.koordinaten.lat, a.koordinaten.lon]);
  });
  if(bounds.length === 1){ map.setView(bounds[0], 15); }
  else{ map.fitBounds(bounds, { padding: [30,30] }); }
}

function renderAuftragTable(list, isErledigtTab){
  if(list.length === 0){
    return `<div class="empty-state">
      <div class="big">${isErledigtTab ? 'Noch keine erledigten Vorgänge' : 'Keine offenen Vorgänge'}</div>
      <div>${isErledigtTab ? 'Erledigte Aufträge erscheinen hier automatisch.' : 'Importiere eine CSV- oder Excel-Datei, um Vorgänge anzulegen.'}</div>
    </div>`;
  }
  const vc = settings.visibleColumns || DEFAULT_VISIBLE_COLUMNS;
  const show = k => vc[k] !== false;

  const rows = list.slice().sort((a,b) => (a.kundencode||'').localeCompare(b.kundencode||'')).map(a => `
    <tr>
      <td data-label="Kundencode"><span class="code">${escapeHtml(a.kundencode)}</span></td>
      ${show('vorgang') ? `<td data-label="Vorgang">${escapeHtml(a.vorgang)}</td>` : ''}
      ${show('status') ? `<td data-label="Status">
        <select class="status-select ${STATUS[a.status].cls}" onchange="setStatus('${a.id}', this.value)">
          ${Object.entries(STATUS).map(([k,v]) => `<option value="${k}" ${k===a.status?'selected':''}>${v.label}</option>`).join('')}
        </select>
      </td>` : ''}
      ${show('telefonnummer') ? `<td data-label="Telefon">
        <input class="cell-input" type="text" value="${escapeHtml(a.telefonnummer)}"
          onchange="updateAuftragField('${a.id}','telefonnummer', this.value)" placeholder="–">
      </td>` : ''}
      ${show('adresse') ? `<td data-label="Adresse">
        <input class="cell-input" type="text" value="${escapeHtml(a.adresse)}"
          onchange="updateAuftragField('${a.id}','adresse', this.value)" placeholder="–">
      </td>` : ''}
      ${show('kommentar') ? `<td data-label="Kommentar">
        <textarea class="cell-input" rows="1" onchange="updateAuftragField('${a.id}','kommentar', this.value)" placeholder="Notiz…">${escapeHtml(a.kommentar)}</textarea>
      </td>` : ''}
      ${show('termin') ? `<td data-label="Termin">
        ${a.termin
          ? `<span class="termin-chip">${a.termin.date} · ${a.termin.time}</span>`
          : `<span class="muted">–</span>`}
      </td>` : ''}
      ${show('koordinaten') ? `<td data-label="Koordinaten">
        <input class="cell-input" type="text" value="${escapeHtml(fmtCoords(a.koordinaten))}"
          onchange="updateAuftragCoords('${a.id}', this.value)" placeholder="52.130, 11.630" style="font-family:var(--font-mono);font-size:12px">
      </td>` : ''}
      <td data-label="Aktionen">
        <div class="row-actions">
          <button class="icon-btn" onclick="openTerminModal('${a.id}')" title="Termin festlegen">📅</button>
          <button class="icon-btn" onclick="openAuftragHistory('${a.id}')" title="Verlauf">🕒</button>
        </div>
      </td>
    </tr>
  `).join('');

  const headCells = [
    '<th>Kundencode</th>',
    show('vorgang') ? '<th>Vorgang</th>' : '',
    show('status') ? '<th>Status</th>' : '',
    show('telefonnummer') ? '<th>Telefon</th>' : '',
    show('adresse') ? '<th>Adresse</th>' : '',
    show('kommentar') ? '<th>Kommentar</th>' : '',
    show('termin') ? '<th>Termin</th>' : '',
    show('koordinaten') ? '<th>Koordinaten</th>' : '',
    '<th></th>'
  ].join('');

  return `<div class="grid-wrap"><table>
    <thead><tr>${headCells}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderAdressbuch(){
  if(adressbuch.length === 0){
    return `<div class="empty-state">
      <div class="big">Adressbuch ist leer</div>
      <div>Einträge entstehen automatisch beim Import und bleiben dauerhaft erhalten.</div>
    </div>`;
  }
  const rows = adressbuch.slice().sort((a,b)=>(a.adresse||'').localeCompare(b.adresse||'')).map(e => `
    <tr>
      <td data-label="Adresse">
        <input class="cell-input" type="text" value="${escapeHtml(e.adresse)}" onchange="updateAdrField('${e.id}','adresse', this.value)">
      </td>
      <td data-label="Zählerplatz-ID"><span class="code">${escapeHtml(e.zaehlerplatzId || '–')}</span></td>
      <td data-label="Telefon">
        <input class="cell-input" type="text" value="${escapeHtml(e.telefonnummer)}" onchange="updateAdrField('${e.id}','telefonnummer', this.value)">
      </td>
      <td data-label="Koordinaten">
        <input class="cell-input" type="text" value="${escapeHtml(fmtCoords(e.koordinaten))}" placeholder="52.130, 11.630"
          onchange="updateAdrCoordsField('${e.id}', this.value)" style="font-family:var(--font-mono);font-size:12px">
      </td>
      <td data-label="Kundencode"><span class="muted">${escapeHtml(e.kundencode || '–')}</span></td>
      <td data-label="Verlauf">
        <button class="icon-btn" onclick="openAdrHistory('${e.id}')">🕒 ${e.history.length}</button>
      </td>
    </tr>
  `).join('');
  return `<div class="grid-wrap"><table>
    <thead><tr><th>Adresse</th><th>Zählerplatz-ID</th><th>Telefon</th><th>Koordinaten</th><th>Kundencode</th><th>Verlauf</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function updateAdrCoordsField(entryId, value){
  if(!value.trim()){ updateAdrCoords(entryId, null); render(); return; }
  const parsed = parseCoords(value);
  if(!parsed){ showToast('Ungültiges Koordinatenformat, z.B. 52.130, 11.630'); render(); return; }
  updateAdrCoords(entryId, parsed);
  showToast('Gespeichert');
}

/* ---------------------------------------------------------------
   Field updates
--------------------------------------------------------------- */
function updateAuftragField(id, field, value){
  const a = auftraege.find(x => x.id === id);
  if(!a) return;
  const oldVal = a[field] || '';
  if(oldVal === value) return;
  a.history.push({ ts: nowIso(), field, old: oldVal, new: value });
  a[field] = value;
  saveAuftraege();

  // propagate phone/address edits into address book
  if((field === 'telefonnummer' || field === 'adresse') && a.adrEntryId){
    updateAdrField(a.adrEntryId, field, value);
  }
  showToast('Gespeichert');
}

function setStatus(id, newStatus){
  const a = auftraege.find(x => x.id === id);
  if(!a) return;
  const old = a.status;
  if(old === newStatus) return;
  a.history.push({ ts: nowIso(), field:'status', old: STATUS[old].label, new: STATUS[newStatus].label });
  a.status = newStatus;
  saveAuftraege();
  render();
  showToast(newStatus === 'erledigt' ? 'Als erledigt markiert' : 'Status aktualisiert');
}

/* ---------------------------------------------------------------
   History modals
--------------------------------------------------------------- */
function historyHtml(history){
  if(!history || history.length === 0) return '<p class="hint">Kein Verlauf vorhanden.</p>';
  const items = history.slice().reverse().map(h => `
    <li><span class="ts">${fmtTs(h.ts)}</span> — <strong>${escapeHtml(h.field)}</strong>:
      ${h.old ? `„${escapeHtml(h.old)}“ → ` : ''}„${escapeHtml(h.new)}“
    </li>
  `).join('');
  return `<ul class="history-list">${items}</ul>`;
}
function openAuftragHistory(id){
  const a = auftraege.find(x => x.id === id);
  if(!a) return;
  showModal(`
    <div class="modal-head"><h3>Verlauf · ${escapeHtml(a.kundencode)}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${historyHtml(a.history)}</div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Schließen</button></div>
  `);
}
function openAdrHistory(id){
  const e = adressbuch.find(x => x.id === id);
  if(!e) return;
  showModal(`
    <div class="modal-head"><h3>Verlauf · ${escapeHtml(e.adresse || e.zaehlerplatzId || 'Adressbuch')}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${historyHtml(e.history)}</div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Schließen</button></div>
  `);
}

/* ---------------------------------------------------------------
   Termin modal + ICS generation
--------------------------------------------------------------- */
function openTerminModal(id){
  const a = auftraege.find(x => x.id === id);
  if(!a) return;
  terminModalAuftragId = id;
  const today = new Date().toISOString().slice(0,10);
  showModal(`
    <div class="modal-head"><h3>Termin festlegen · ${escapeHtml(a.kundencode)}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Datum</label><input type="date" id="terminDate" value="${a.termin ? a.termin.dateIso : today}"></div>
        <div class="field"><label>Uhrzeit</label><input type="time" id="terminTime" value="${a.termin ? a.termin.time : '09:00'}"></div>
        <div class="field" style="max-width:120px"><label>Dauer (Min.)</label><input type="number" id="terminDuration" value="${a.termin ? a.termin.duration : 60}" min="15" step="15"></div>
      </div>
      <div class="field">
        <label>Betreff</label>
        <input type="text" id="terminSubject" value="Termin: ${escapeHtml(a.kundencode)} – ${escapeHtml(a.vorgang)}">
      </div>
      <div class="field">
        <label>Ort</label>
        <input type="text" id="terminLocation" value="${escapeHtml(a.adresse)}">
      </div>
      <div class="field">
        <label>Teilnehmer-E-Mail (optional)</label>
        <input type="email" id="terminAttendee" placeholder="kunde@beispiel.de">
        <p class="hint">Ohne E-Mail wird eine normale Kalenderdatei erzeugt, die du beim Öffnen direkt in deinen Kalender übernimmst. Mit E-Mail wird eine echte Termineinladung erzeugt, die du nach dem Öffnen in Outlook nur noch senden musst.</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" onclick="generateIcs()">Termindatei erzeugen</button>
    </div>
  `);
}

function pad(n){ return n.toString().padStart(2,'0'); }

function generateIcs(){
  const a = auftraege.find(x => x.id === terminModalAuftragId);
  if(!a) return;
  const dateIso = document.getElementById('terminDate').value;
  const time = document.getElementById('terminTime').value;
  const duration = parseInt(document.getElementById('terminDuration').value, 10) || 60;
  const subject = document.getElementById('terminSubject').value || 'Termin';
  const location = document.getElementById('terminLocation').value || '';
  const attendee = document.getElementById('terminAttendee').value.trim();

  if(!dateIso || !time){ showToast('Bitte Datum und Uhrzeit angeben'); return; }
  if(!settings.organizerEmail){
    showToast('Bitte zuerst deine Absenderadresse hinterlegen');
    openSettingsModal();
    return;
  }

  const [y,mo,d] = dateIso.split('-').map(n=>parseInt(n,10));
  const [hh,mm] = time.split(':').map(n=>parseInt(n,10));
  const start = new Date(y, mo-1, d, hh, mm, 0);
  const end = new Date(start.getTime() + duration*60000);

  const dtStart = `${start.getFullYear()}${pad(start.getMonth()+1)}${pad(start.getDate())}T${pad(start.getHours())}${pad(start.getMinutes())}00`;
  const dtEnd = `${end.getFullYear()}${pad(end.getMonth()+1)}${pad(end.getDate())}T${pad(end.getHours())}${pad(end.getMinutes())}00`;
  const dtStamp = new Date().toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
  const eventUid = (a.termin && a.termin.uid) ? a.termin.uid : (uid() + '@auftragsmappe');
  const seq = (a.termin && typeof a.termin.sequence === 'number') ? a.termin.sequence + 1 : 0;

  const descLines = [];
  if(a.vorgang) descLines.push('Vorgang: ' + a.vorgang);
  if(a.telefonnummer) descLines.push('Telefon: ' + a.telefonnummer);
  if(a.kommentar) descLines.push('Notiz: ' + a.kommentar);
  const description = descLines.join(String.fromCharCode(10));

  const method = attendee ? 'REQUEST' : 'PUBLISH';
  let icsLines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Auftragsmappe//DE',
    'CALSCALE:GREGORIAN',
    'METHOD:' + method,
    'BEGIN:VEVENT',
    'UID:' + eventUid,
    'DTSTAMP:' + dtStamp,
    'DTSTART:' + dtStart,
    'DTEND:' + dtEnd,
    'SUMMARY:' + icsEscape(subject),
    'LOCATION:' + icsEscape(location),
    'DESCRIPTION:' + icsEscape(description),
    'ORGANIZER;CN=' + icsEscape(settings.organizerEmail) + ':mailto:' + settings.organizerEmail,
  ];
  if(attendee){
    icsLines.push('ATTENDEE;CN=' + icsEscape(a.kundencode) + ';RSVP=TRUE:mailto:' + attendee);
  }
  icsLines.push('STATUS:CONFIRMED');
  icsLines.push('SEQUENCE:' + seq);
  icsLines.push('END:VEVENT');
  icsLines.push('END:VCALENDAR');

  const icsContent = icsLines.join('\r\n');
  const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `Termin_${(a.kundencode||'auftrag').replace(/[^a-z0-9]/gi,'_')}.ics`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

  const oldTermin = a.termin ? `${a.termin.date} ${a.termin.time}` : '';
  a.termin = { dateIso, date: `${pad(d)}.${pad(mo)}.${y}`, time, duration, uid: eventUid, sequence: seq };
  a.history.push({ ts: nowIso(), field:'termin', old: oldTermin, new: `${a.termin.date} ${a.termin.time}` });
  if(a.status === 'offen'){
    a.history.push({ ts: nowIso(), field:'status', old: STATUS.offen.label, new: STATUS.termin_vereinbart.label });
    a.status = 'termin_vereinbart';
  }
  saveAuftraege();
  closeModal();
  render();
  showToast(attendee
    ? 'Termindatei heruntergeladen – öffnen und in Outlook senden'
    : 'Termindatei heruntergeladen – öffnen, um sie in den Kalender zu übernehmen');
}

function icsEscape(s){
  return (s||'').toString().replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

/* ---------------------------------------------------------------
   Init
--------------------------------------------------------------- */
(async function init(){
  await loadAll();
  await tryRestoreFolder();
  render();
})();

if('serviceWorker' in navigator && location.protocol !== 'file:'){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
